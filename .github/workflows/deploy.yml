name: Lint, Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          poetry install --no-root
          pip install flake8
      - name: Run linter
        run: poetry run flake8 main.py --max-line-length=100 --ignore=E501,W503 --exit-zero

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run syntax check
        run: python3 -c "import py_compile; py_compile.compile('main.py', doraise=True)"

      - name: Check imports
        run: poetry run python3 -c "import aiogram; import aiohttp; print('OK')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: support-bot
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /home/orangepi/support-bot

            echo "=== Pulling latest code ==="
            git pull origin master

            echo "=== Installing dependencies ==="
            source venv/bin/activate
            pip install poetry
            poetry install

            echo "=== Restarting bot ==="
            sudo /bin/systemctl restart support-bot

            echo "=== Checking status ==="
            sleep 3
            sudo /bin/systemctl status support-bot --no-pager

            echo "=== Deploy complete ==="
